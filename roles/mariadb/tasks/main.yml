- name: Install mariaDB server and client
  package:
    name:
      - mariadb-server
      - mariadb-client
    state: present

- name: Ensure MariaDB is running and enabled
  service:
    name: mariadb
    state: started
    enabled: true

- name: Copy custom MariaDB configuration
  copy:
    src: 99-custom.cnf
    dest: /etc/mysql/mariadb.conf.d/99-custom.cnf
    owner: root
    group: root
    mode: "0644"
  notify: restart mariadb
